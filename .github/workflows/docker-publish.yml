name: publish confer image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'shared/**'
      - 'server/**'
      - 'web/**'
      - 'cli/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/rohansx/confer:latest,ghcr.io/rohansx/confer:${{ github.sha }}
          provenance: false
