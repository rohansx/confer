services:
  confer:
    image: confer:local
    environment:
      NODE_ENV: production
      APP_ORIGIN: ${APP_ORIGIN}
      VIEW_ORIGIN: ${VIEW_ORIGIN}
      SIGNING_SECRET: ${CONFER_SIGNING_SECRET}
      DB_PATH: /app/data/confer.db
      BLOB_DIR: /app/blobs
      PORT: "5173"
      VIEW_PORT: "5174"
      MAGIC_LINK_DEV_ECHO: ${MAGIC_LINK_DEV_ECHO:-1}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    volumes:
      - confer-data:/app/data
      - confer-blobs:/app/blobs
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect for the dashboard hostname
      - "traefik.http.routers.confer-root-web.rule=Host(`tryconfer.com`)"
      - "traefik.http.routers.confer-root-web.entrypoints=web"
      - "traefik.http.routers.confer-root-web.service=confer-app-svc"
      - "traefik.http.routers.confer-root-web.middlewares=confer-redirect-https@docker"
      # HTTPS dashboard
      - "traefik.http.routers.confer-root-websecure.rule=Host(`tryconfer.com`)"
      - "traefik.http.routers.confer-root-websecure.entrypoints=websecure"
      - "traefik.http.routers.confer-root-websecure.tls=true"
      - "traefik.http.routers.confer-root-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.confer-root-websecure.service=confer-app-svc"
      # www → root redirect
      - "traefik.http.routers.confer-www-web.rule=Host(`www.tryconfer.com`)"
      - "traefik.http.routers.confer-www-web.entrypoints=web"
      - "traefik.http.routers.confer-www-web.service=confer-app-svc"
      - "traefik.http.routers.confer-www-web.middlewares=confer-redirect-https@docker"
      - "traefik.http.routers.confer-www-websecure.rule=Host(`www.tryconfer.com`)"
      - "traefik.http.routers.confer-www-websecure.entrypoints=websecure"
      - "traefik.http.routers.confer-www-websecure.tls=true"
      - "traefik.http.routers.confer-www-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.confer-www-websecure.service=confer-app-svc"
      # HTTP → HTTPS for view origin
      - "traefik.http.routers.confer-view-web.rule=Host(`view.tryconfer.com`)"
      - "traefik.http.routers.confer-view-web.entrypoints=web"
      - "traefik.http.routers.confer-view-web.service=confer-view-svc"
      - "traefik.http.routers.confer-view-web.middlewares=confer-redirect-https@docker"
      # HTTPS view origin
      - "traefik.http.routers.confer-view-websecure.rule=Host(`view.tryconfer.com`)"
      - "traefik.http.routers.confer-view-websecure.entrypoints=websecure"
      - "traefik.http.routers.confer-view-websecure.tls=true"
      - "traefik.http.routers.confer-view-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.confer-view-websecure.service=confer-view-svc"
      # Service definitions (port mapping to container)
      - "traefik.http.services.confer-app-svc.loadbalancer.server.port=5173"
      - "traefik.http.services.confer-view-svc.loadbalancer.server.port=5174"
      # HTTP→HTTPS redirect middleware
      - "traefik.http.middlewares.confer-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.confer-redirect-https.redirectscheme.permanent=true"

networks:
  dokploy-network:
    external: true

volumes:
  confer-data:
  confer-blobs: