services:
  confer:
    image: nginx:alpine
    container_name: confer
    restart: unless-stopped
    ports:
      - "5173:80"
      - "5174:8080"
    environment:
      NODE_ENV: production
      SIGNING_SECRET: "${CONFER_SIGNING_SECRET}"
    volumes:
      - confer-data:/app/data
      - confer-blobs:/app/blobs

volumes:
  confer-data:
  confer-blobs: